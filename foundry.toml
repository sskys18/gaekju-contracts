[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
fuzz = { runs = 10000, seed = "0xdeadbeef" }
invariant = { runs = 256, depth = 50 }
fs_permissions = [{ access = "read", path = "out" }]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
